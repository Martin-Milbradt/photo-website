<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotobuch Anzeige</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="stylesheet" href="dist/output.css" />
        <style>
            html.pre-authed #login-screen { display: none !important; }
            html.pre-authed #main-content { display: block !important; }
        </style>
        <script>
            (function () {
                var c = document.cookie;
                if (c.indexOf("authenticated=true") === -1) return;
                if (location.pathname.indexOf("admin.html") !== -1 && c.indexOf("isAdmin=true") === -1) return;
                document.documentElement.classList.add("pre-authed");
            })();
        </script>
    </head>
    <body class="bg-gradient-to-br from-travel-ocean via-travel-teal to-travel-sand min-h-screen">
        <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
            <div class="bg-white rounded-2xl shadow-2xl p-8 md:p-12 max-w-md w-full text-center">
                <div class="mb-6">
                    <svg
                        class="w-16 h-16 mx-auto mb-4 text-travel-coral"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
                        ></path>
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"
                        ></path>
                    </svg>
                    <h1
                        class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-travel-coral to-travel-sunset bg-clip-text text-transparent mb-2"
                    >
                        Reise Erinnerungen
                    </h1>
                    <p class="text-gray-600">Passwort eingeben, um Fotobuch anzusehen</p>
                </div>
                <input
                    type="password"
                    id="password-input"
                    placeholder="Passwort"
                    autocomplete="off"
                    class="w-full px-4 py-3 mb-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-travel-teal transition-colors"
                />
                <button
                    id="login-btn"
                    onclick="checkPassword()"
                    class="w-full bg-gradient-to-r from-travel-coral to-travel-sunset text-white py-3 rounded-xl font-semibold hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200"
                >
                    Anmelden
                </button>
                <p id="login-error" class="text-red-500 mt-4 text-sm min-h-[20px]"></p>
            </div>
        </div>

        <div id="main-content" class="hidden min-h-screen py-8 px-4">
            <div class="max-w-7xl mx-auto">
                <header class="bg-white rounded-2xl shadow-lg p-6 mb-8">
                    <a
                        href="index.html"
                        class="inline-flex items-center text-travel-teal hover:text-travel-ocean mb-4 font-semibold transition-colors"
                    >
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18"
                            ></path>
                        </svg>
                        Zurück zu Fotobüchern
                    </a>
                    <h1
                        id="photobook-title"
                        class="text-3xl font-bold bg-gradient-to-r from-travel-coral to-travel-sunset bg-clip-text text-transparent"
                    >
                        Fotobuch
                    </h1>
                </header>

                <div class="bg-white rounded-2xl shadow-lg p-4 md:p-6">
                    <div id="photobook-container" class="w-full min-h-[800px] rounded-xl overflow-hidden">
                        <!-- PosterXXL photobook will be embedded here -->
                    </div>
                </div>
            </div>
        </div>

        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
        <script src="firebase-config.js"></script>
        <script src="auth.js"></script>
        <script src="photobooks.js"></script>
        <script src="photobook-viewer.js"></script>
    </body>
</html>
